<div class="create-task-container" *ngIf="currentStep() == 1">

  <div class="create-task-form">
    <h2>Create New Salt Task:</h2>

    <div class="form-step current-step">
      <!-- <h3>Step 1: Basic Information</h3> -->
      <div class="form-group">
        <!-- <label for="taskTitle">Task Title <span class="required">*</span></label> -->
        <input id="taskTitle" type="text" [(ngModel)]="taskTitle" placeholder="Task title.." required />
      </div>

      <div class="form-group">
        <!-- <label for="taskDescription">Description (Optional)</label> -->
        <input id="taskDescription" type="text" [(ngModel)]="taskDescription" placeholder="Description..">
      </div>

      <div class="form-actions">
        <button class="primary-button" [disabled]="!taskTitle()" (click)="nextStep()">Next</button>
      </div>
    </div>
  </div>
</div>


<div class="create-task-container" *ngIf="currentStep() == 2">
  {{taskTitle()}}
  <div class="create-task-form">
    <h2>Select project:</h2>

    <div class="form-step current-step">
      <!-- <h3>Step 1: Basic Information</h3> -->
      <div class="project-chips">
        <button *ngFor="let project of projects()" class="project-chip"
          [class.selected]="selectedProject()?.id === project.id" (click)="selectProject(project)">
          {{ project.name }}
        </button>
      </div>

      <div class="form-actions">
        <button class="secondary-button" (click)="previousStep()">Back</button>
        <button class="primary-button" [disabled]="!selectedProject()" (click)="nextStep()">Next</button>
      </div>
    </div>
  </div>
</div>

<div class="create-task-container" *ngIf="currentStep() == 3">
  {{taskTitle()}} <span *ngIf="selectedProject()">- {{selectedProject()?.name}}</span>
  <div class="create-task-form">
    <h2>Select Commands:</h2>

    <div class="form-step current-step">

      <div class="commands-split-view">
        <div class="available-commands-section">
          <h3>Available Commands</h3>
          <div class="command-list compact">
            <div *ngFor="let cmd of commands()" class="command-item compact-item"
              [class.selected]="isCommandSelected(cmd)" (click)="toggleCommand(cmd)">
              <div class="command-string">{{ cmd.commandString }}</div>
            </div>
          </div>
        </div>

        <div class="selected-commands-section">
          <h3>Selected Commands</h3>
          <div class="selected-commands-preview compact">
            <div *ngIf="selectedCommands().length === 0" class="no-commands">
              No commands selected.
            </div>
            <ul class="selected-command-list" *ngIf="selectedCommands().length > 0">
              <li *ngFor="let scmd of selectedCommands()" (click)="toggleCommand(scmd)" title="Click to remove">
                <code class="cmd-string">{{ scmd.commandString }}</code>
              </li>
            </ul>
          </div>
        </div>
      </div>

      <div class="form-actions" style="justify-content: space-between;">
        <button class="secondary-button" (click)="previousStep()">Back</button>
        <button class="primary-button" [disabled]="selectedCommands().length === 0"
          (click)="submitTask()">Submit</button>
      </div>
    </div>
  </div>
</div>
